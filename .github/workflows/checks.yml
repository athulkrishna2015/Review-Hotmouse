name: checks

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Setup Python
        uses: actions/setup-python@v3
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: python -m pip install aqt mypy pytest PyQt6 PyQt6-WebEngine

      - name: Run mypy
        run: mypy --install-types --non-interactive addon/
