name: Build Addon

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.10"

      - name: Bundle files and zip
        run: |
          # Copy license and readme into the addon folder for the package
          cp LICENSE README.md addon/
          
          # Create the addon file
          cd addon
          zip -r ../review_hotmouse_plus_overview_dev.ankiaddon * -x "__pycache__/*" "*.pyc"
          cd ..

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: review-hotmouse-plus-overview-dev
          path: review_hotmouse_plus_overview_dev.ankiaddon
          if-no-files-found: error
